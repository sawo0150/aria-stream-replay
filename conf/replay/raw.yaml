# replay/raw.yaml
# 모드 A. Raw Replay 모드
# 가장 "온라인 실시간"에 가까운 설정. 
# Odom이나 Map 없이 순수하게 이미지/센서 데이터만 전송합니다.

mode: raw
rate: 1.0           # 재생 속도 (1.0 = 실제 기기 시간과 동일, 2.0 = 2배속)
step_mode: false    # True일 경우 키보드 입력 시에만 다음 프레임으로 넘어감
loop: false         # 파일이 끝났을 때 다시 처음부터 재생할지 여부
use_odom: false     # Trajectory(Odom) 사용 안 함