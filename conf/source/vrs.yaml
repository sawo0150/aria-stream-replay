# source/vrs.yaml

# 입력 데이터 소스가 'VRS 파일'일 때의 설정
type: vrs

# VRS 파일의 전체 경로
vrs_path: ~/Desktop/26-1_RPM/CustomData/Aria_recordings/301_1253/301_1253.vrs
# MPS 결과물이 들어있는 최상위 폴더 경로 추가
mps_path: ~/Desktop/26-1_RPM/CustomData/Aria_recordings/301_1253/mps_301_1253_vrs

calibration_path: null

# 사용할 카메라 스트림 이름
# - rgb        -> camera-rgb
# - slam_left  -> camera-slam-left
# - slam_right -> camera-slam-right
camera_stream: rgb

# 현재 pub main.py / vrs_reader.py diff에서는 IMU는 직접 사용하지 않음
# (향후 확장용)
use_imu: true
 

# 이미지 전처리 / rectification 설정
rectify:
  # true면 raw fisheye -> pinhole rectified image를 publish
  enabled: true

  # downstream SLAM은 pinhole camera model을 기대
  output_model: "pinhole"
 
  # rectified 출력 해상도
  # 처음엔 512x512 또는 640x640 정도로 시작하는 걸 추천
  width: 512
  height: 512

  # target pinhole focal length (pixel 단위)
  # 작을수록 더 넓은 시야, 클수록 더 좁은 시야
  # rectified 결과를 viewer로 보면서 조정
  focal_px: 280.0

  # 필요 시 시계방향 90도 회전
  # true면 최종 출력 width/height가 서로 바뀜
  rotate_cw90: false

  # 디버그용: 첫 프레임 raw / rectified를 저장해서 눈으로 확인
  save_debug_pair_once: true
  debug_dir: "./debug_rectify"